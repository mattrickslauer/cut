edition: 3.0.0
name: cut-audition
access: default

# Self-contained co-star reader — its own scale-to-zero FC function, deploys
# independently of the director (backend/s.yaml). Same region, same DashScope key.
vars:
  region: ap-southeast-1

resources:
  costar:
    component: fc3
    props:
      region: ${vars.region}
      functionName: cut-audition
      description: "Cut! Audition Room — qwen-max scene-partner reader + qwen-tts voice"
      runtime: custom.debian10
      code: .                          # this folder (app.py, stdlib-only)
      handler: index.handler           # unused by custom runtime; required field
      cpu: 0.5
      memorySize: 512
      diskSize: 512
      timeout: 60                      # /costar does ASR + reply + TTS sequentially; stays well under
      instanceConcurrency: 5
      environmentVariables:
        QWEN_API_KEY: ${env('QWEN_API_KEY')}   # injected from shell at deploy; never committed
        ASR_MODEL: qwen3-asr-flash             # actor's line -> text (see ../../research/asr.md)
        COSTAR_MODEL: qwen-flash               # fastest good reply (~1.5s); qwen-max/qwen-plus also fine
        TTS_MODEL: qwen3-tts-flash             # voices the reply (verified live on intl Model Studio)
        TTS_VOICE: Cherry                      # default; each scene overrides per character
      customRuntimeConfig:
        command:
          - python3
          - app.py
        port: 9000
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
